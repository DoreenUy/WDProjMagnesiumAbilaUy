<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Through the Halls of Hogwarts" />
  <meta name="author" content="JDL Abila and DA Uy" />

  <title>Through the Halls of Hogwarts | Exploring Harry Potter</title>
  <link rel="icon" href="assets/Project_Logo.webp" type="image/webp" />
  <link rel="stylesheet" href="Through The Halls of Hogwarts.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Georgia', serif;
    background: black;
}

#mapContainer {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

#map {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 1.2s ease;
    transform-origin: center center;
}

.hotspot {
    position: absolute;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    background: radial-gradient(circle, gold 0%, orange 40%, transparent 70%);
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 5px gold; }
    50% { box-shadow: 0 0 25px gold; }
    100% { box-shadow: 0 0 5px gold; }
}

.label {
    position: absolute;
    background: rgba(0,0,0,0.8);
    color: gold;
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 14px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
}

.hotspot:hover + .label {
    opacity: 1;
}

#infoPanel {
    position: absolute;
    right: -450px;
    top: 0;
    width: 450px;
    height: 100%;
    background: url("https://www.transparenttextures.com/patterns/aged-paper.png"), #f4e7c5;
    color: #2b1b0e;
    padding: 25px;
    box-sizing: border-box;
    transition: right 0.8s ease;
    overflow-y: auto;
    box-shadow: -5px 0 20px black;
}

#infoPanel h2 {
    margin-top: 0;
}

#infoPanel img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 15px;
}

#backBtn {
    background: #5a3e1b;
    color: gold;
    border: none;
    padding: 10px;
    cursor: pointer;
    font-weight: bold;
    width: 100%;
    margin-top: 20px;
}

#backBtn:hover {
    background: #3d2a12;
}
</style>
</head>

<body>

<audio id="bgMusic" loop autoplay>
<source src="https://cdn.pixabay.com/audio/2022/10/16/audio_12c6b1f2d0.mp3" type="audio/mpeg">
</audio>

<audio id="clickSound">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9c2e6b.mp3" type="audio/mpeg">
</audio>

<div id="mapContainer">

<img src="assets/Hogwarts-Castle-Map (1).jpg" id="map">

<div class="hotspot" style="top:55%; left:75%;" onclick="showLocation('Great Hall', 55, 75)"></div>
<div class="label" style="top:52%; left:75%;">Great Hall</div>

<div class="hotspot" style="top:35%; left:45%;" onclick="showLocation('Library', 35, 45)"></div>
<div class="label" style="top:32%; left:45%;">Library</div>

<div class="hotspot" style="top:85%; left:30%;" onclick="showLocation('Clock Tower', 85, 30)"></div>
<div class="label" style="top:82%; left:30%;">Clock Tower</div>

<div class="hotspot" style="top:70%; left:20%;" onclick="showLocation('Dungeons', 70, 20)"></div>
<div class="label" style="top:67%; left:20%;">Dungeons</div>

<div class="hotspot" style="top:80%; left:50%;" onclick="showLocation('Astronomy Tower', 80, 50)"></div>
<div class="label" style="top:77%; left:50%;">Astronomy Tower</div>

<div class="hotspot" style="top:60%; left:55%;" onclick="showLocation('Grand Staircase', 60, 55)"></div>
<div class="label" style="top:57%; left:55%;">Grand Staircase</div>

<div class="hotspot" style="top:40%; left:70%;" onclick="showLocation('Greenhouses', 40, 70)"></div>
<div class="label" style="top:37%; left:70%;">Greenhouses</div>

<div class="hotspot" style="top:90%; left:15%;" onclick="showLocation('Boathouse', 90, 15)"></div>
<div class="label" style="top:87%; left:15%;">Boathouse</div>

<div id="infoPanel">
<h2 id="title"></h2>
<img id="image">
<p id="desc"></p>
<button id="backBtn" onclick="resetMap()">Return to Map</button>
</div>

</div>

<script>

const map = document.getElementById("map");
const panel = document.getElementById("infoPanel");
const clickSound = document.getElementById("clickSound");

function showLocation(name, top, left) {

clickSound.play();
panel.style.right = "0px";

let x = (left - 50) * -1;
let y = (top - 50) * -1;

map.style.transform = `scale(2) translate(${x}%, ${y}%)`;

const locations = {

"Great Hall": {
img: "assets/The Great Hall.png",
desc: "The heart of Hogwarts where students feast and are sorted."
},

"Library": {
img: "assets/library.webp",
desc: "Home to thousands of magical books and the Restricted Section."
},

"Clock Tower": {
img: "assets/clock tower.png",
desc: "Connects the South Wing and Grand Staircase."
},

"Dungeons": {
img: "assets/Dungeons.webp",
desc: "Dark stone corridors beneath the castle."
},

"Astronomy Tower": {
img: "assets/Astronomy Tower.jpg",
desc: "The tallest tower used for Astronomy classes."
},

"Grand Staircase": {
img: "assets/Grand Stairecase.webp",
desc: "Moving staircases leading to every corner of the castle."
},

"Greenhouses": {
img: "assets/Greenhouse.png",
desc: "Where magical plants are grown for Herbology."
},

"Boathouse": {
img: "assets/Boat House.webp",
desc: "Where first years arrive by boat across the lake."
}

};

document.getElementById("title").innerText = name;
document.getElementById("image").src = locations[name].img;
document.getElementById("desc").innerText = locations[name].desc;
}

function resetMap() {
map.style.transform = "scale(1) translate(0,0)";
panel.style.right = "-450px";
}

</script>

</body>
</html>
