<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hogwarts Sorting</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Playfair+Display&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Playfair Display', serif;
  background: #1a1a2e;
  color: #f0f0f0;
  margin:0; padding:0;
}
nav {
  display: flex;
  justify-content: center;
  gap: 28px;
  padding: 22px;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid rgba(212, 175, 55, 0.3);
  position: relative;
  z-index: 2;
}

nav a {
  font-family: "Cinzel", serif;
  color: #f5f5f5;
  text-decoration: none;
  letter-spacing: 1.5px;
  font-size: 0.95rem;
  position: relative;
}

nav a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -6px;
  width: 0;
  height: 2px;
  background: #d4af37;
  transition: width 0.3s ease;
}

nav a:hover::after {
  width: 100%;
}
.sorting-form {
  max-width:650px;
  margin:50px auto;
  padding:40px;
  background:#2b2b44;
  border-radius:15px;
  box-shadow: 0 0 25px rgba(255,215,0,0.3);
}

h2 {
  font-family: 'Cinzel Decorative', serif;
  font-size:2.2rem;
  text-align:center;
  color:#ffd700;
  margin-bottom:20px;
  text-shadow: 0 0 8px #ffd700;
}

form label {
  display:block; margin-top:20px; font-weight:bold;
}

input[type="text"], select {
  width:100%; padding:10px; margin-top:5px;
  border-radius:8px; border:none;
  background:#1a1a2e; color:#f0f0f0;
}

.traits label, .classes label {
  display:inline-block;
  background:#1a1a2e;
  padding:5px 10px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.traits input:checked + span, .classes input:checked + span {
  background:#ffd700;
  color:#1a1a2e;
}

input[type="checkbox"] { display:none; }

button {
  margin-top:20px; padding:12px 25px;
  border:none; border-radius:8px;
  background:#ffd700; color:#1a1a2e; font-weight:bold; cursor:pointer;
  transition:0.3s;
}
button:hover { background:#e5c100; }

#sortingHatContainer {
  text-align:center; margin-top:30px; display:none; position:relative;
}
#sortingHat { width:200px; transition: transform 0.2s; }
#houseResult {
  font-size:1.7rem; margin-top:15px;
  font-weight:bold;
  text-shadow:0 0 10px;
}
.navigation-links { text-align:center; margin-top:25px; }
.navigation-links a { color:#ffd700; text-decoration:none; margin:0 10px; font-weight:bold; transition:0.3s; }
.navigation-links a:hover { color:#fff; }
.traits label, .classes label {
  display:inline-block;
  background:#1a1a2e;
  padding:8px 15px;
  margin:5px;
  border-radius:12px;
  cursor:pointer;
  position:relative;
  transition: all 0.3s ease;
  overflow:hidden;
  color:#f0f0f0;
}

.traits input:checked + span, .classes input:checked + span {
  background:#ffd700;
  color:#1a1a2e;
  transform: scale(1.2);
  box-shadow: 0 0 12px #ffd700, 0 0 20px #ffd700 inset;
  animation: sparkle 0.6s ease forwards;
}

@keyframes sparkle {
  0% { box-shadow: 0 0 0px #ffd700, 0 0 0px #ffd700 inset; }
  50% { box-shadow: 0 0 15px #ffd700, 0 0 25px #ffd700 inset; }
  100% { box-shadow: 0 0 8px #ffd700, 0 0 12px #ffd700 inset; }
}

.traits label:hover, .classes label:hover {
  transform: scale(1.05);
  box-shadow: 0 0 6px #ffd700;
}
</style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
    <a href="The Magic Begins.html">The Magic Begins</a>
    <a href="Mysteries of the Hogwarts Houses.html">Hogwarts Houses</a>
    <a href="Heroes of the Wizarding World.html">Characters</a>
    <a href="HogwartsSorting.html">Hogwarts Sorting</a>
    <a href="The Art of Wizardry.html">Wizardry</a>
    <a href="Meet the Minds Behind the Magic.html">Minds Behind the Magic</a>
</nav>

<section class="sorting-form">
<h2>Discover Your Hogwarts House</h2>

<form id="hogwartsForm">
<label for="name">Your Name:</label>
<input type="text" id="name" name="name" placeholder="Enter your name" required>

<label for="house">Preferred Hogwarts House:</label>
<select id="house" name="house" required>
<option value="">--Choose a House--</option>
<option value="Gryffindor">Gryffindor</option>
<option value="Hufflepuff">Hufflepuff</option>
<option value="Ravenclaw">Ravenclaw</option>
<option value="Slytherin">Slytherin</option>
</select>

<label>Choose traits that describe you:</label>
<div class="traits">
<label><input type="checkbox" name="traits" value="Brave"><span> Brave</span></label>
<label><input type="checkbox" name="traits" value="Loyal"><span> Loyal</span></label>
<label><input type="checkbox" name="traits" value="Wise"><span> Wise</span></label>
<label><input type="checkbox" name="traits" value="Cunning"><span> Cunning</span></label>
<label><input type="checkbox" name="traits" value="Creative"><span> Creative</span></label>
<label><input type="checkbox" name="traits" value="Determined"><span> Determined</span></label>
</div>

<label>Choose classes you are interested in:</label>
<div class="classes">
<label><input type="checkbox" name="classes" value="Potions"><span> Potions</span></label>
<label><input type="checkbox" name="classes" value="Defense Against the Dark Arts"><span> Defense Against the Dark Arts</span></label>
<label><input type="checkbox" name="classes" value="Herbology"><span> Herbology</span></label>
<label><input type="checkbox" name="classes" value="Charms"><span> Charms</span></label>
<label><input type="checkbox" name="classes" value="Care of Magical Creatures"><span> Care of Magical Creatures</span></label>
</div>

<button type="submit">Submit</button>
<button type="button" id="updateBtn">Update</button>
<button type="button" id="deleteBtn">Delete</button>
</form>

<div id="sortingHatContainer">
<img id="sortingHat" src="assets/Sorting Hat.png" alt="Sorting Hat">
<p id="houseResult"></p>
</div>

<div class="navigation-links">
<a href="page2.html">Go to Profile</a> | 
<a href="page3.html">Go to Class Schedule</a>
</div>
</section>

<script>
const form=document.getElementById('hogwartsForm');
const hatContainer=document.getElementById('sortingHatContainer');
const hatImg=document.getElementById('sortingHat');
const houseResult=document.getElementById('houseResult');

function saveData(house){
const data={
  name:document.getElementById('name').value,
  house:house,
  traits:Array.from(document.querySelectorAll('input[name="traits"]:checked')).map(i=>i.value),
  classes:Array.from(document.querySelectorAll('input[name="classes"]:checked')).map(i=>i.value)
};
localStorage.setItem('hogwartsUser', JSON.stringify(data));
}

form.addEventListener('submit', e=>{
e.preventDefault();
const traits=Array.from(document.querySelectorAll('input[name="traits"]:checked')).map(i=>i.value);
let house='';
if(traits.includes('Brave')) house='Gryffindor';
else if(traits.includes('Loyal')) house='Hufflepuff';
else if(traits.includes('Wise')) house='Ravenclaw';
else if(traits.includes('Cunning')) house='Slytherin';
else house=document.getElementById('house').value || 'Gryffindor';

saveData(house);

hatContainer.style.display='block';
houseResult.textContent='';
hatImg.style.animation='';

let count=0;
const shake=setInterval(()=>{ hatImg.style.transform=`rotate(${count%2===0?15:-15}deg)`; count++; },100);

setTimeout(()=>{
clearInterval(shake);
hatImg.style.transform='rotate(0deg)';
const colorMap={'Gryffindor':'#ff0000','Hufflepuff':'#ffd700','Ravenclaw':'#00aaff','Slytherin':'#00ff00'};
houseResult.textContent=`You are a ${house}!`;
houseResult.style.color=colorMap[house] || '#ffd700';
houseResult.style.textShadow=`0 0 15px ${colorMap[house] || '#ffd700'}`;
},2000);
});

document.getElementById('updateBtn').addEventListener('click', ()=>{
const data=JSON.parse(localStorage.getItem('hogwartsUser'));
if(!data) return alert('No data to update!');
document.getElementById('name').value=data.name;
document.getElementById('house').value=data.house;
document.querySelectorAll('input[name="traits"]').forEach(i=>i.checked=data.traits.includes(i.value));
document.querySelectorAll('input[name="classes"]').forEach(i=>i.checked=data.classes.includes(i.value));
});

document.getElementById('deleteBtn').addEventListener('click', ()=>{
localStorage.removeItem('hogwartsUser');
alert('Data deleted!');
window.location.reload();
});
</script>
</body>
</html>
