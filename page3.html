<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hogwarts Class Schedule</title>
<style>
body{font-family:'Playfair Display', serif;background:#1a1a2e;color:#f0f0f0;margin:0;padding:0;}
nav{background:#2b2b44;padding:15px;text-align:center;}
nav a{color:#f0f0f0;text-decoration:none;margin:0 15px;font-weight:bold;}
nav a:hover{color:#00fff0;text-shadow:0 0 5px #00fff0;}
section{max-width:650px;margin:50px auto;padding:40px;background:#2b2b44;border-radius:15px;box-shadow:0 0 20px rgba(0,255,255,0.2);}
h1{text-align:center;color:#00fff0;text-shadow:0 0 10px #00fff0;}
ul{list-style:none;padding:0;}
li{background:#1a1a2e;padding:10px;margin:5px 0;border-radius:8px;}
</style>
</head>
<body>
<nav>
<a href="HogwartsSorting.html">Back to Sorting</a>
<a href="page2.html">View Profile</a>
</nav>

<section>
<h1>Your Class Schedule</h1>
<ul id="displayClasses"></ul>
</section>

<script>
const data=JSON.parse(localStorage.getItem('hogwartsUser'));
const ul=document.getElementById('displayClasses');
if(data && data.classes){
data.classes.forEach(c=>{const li=document.createElement('li');li.textContent=c;ul.appendChild(li);});
}else{ul.innerHTML='<li>No classes selected. Fill out the sorting form first.</li>';}
</script>
</body>
</html>
